# Features section
features_title: "Why AISight?"
features_subtitle: "A Perplexity alternative that actually respects your privacy."

feat_privacy_title: "True Privacy"
feat_privacy_desc: "No analytics, no tracking, no accounts, no ads. Your searches stay on your device — period."

feat_ai_title: "On-Device AI"
feat_ai_desc: "Answers are generated locally using Apple Intelligence. Your queries never touch a cloud AI service."

feat_search_title: "Private Search"
feat_search_desc: "Searches go through SearXNG — an open-source metasearch engine that aggregates results without tracking you."

feat_citations_title: "Cited Sources"
feat_citations_desc: "Every answer includes numbered citations linking back to original sources, so you can verify the information."

feat_universal_title: "iPhone, iPad & Mac"
feat_universal_desc: "Native app built with SwiftUI. Runs on iPhone 15 Pro and later, iPad with M1+, and any Apple Silicon Mac."

feat_fast_title: "Instant Answers"
feat_fast_desc: "Results stream in real-time as the on-device model generates them. No waiting for cloud round-trips."

# How it works
how_title: "How It Works"
how_subtitle: "From question to answer in seconds — all on your device."
how_step1_title: "You ask a question"
how_step1_desc: "Type any question. AISight sends it to a privacy-respecting SearXNG search server."
how_step2_title: "Web results come back"
how_step2_desc: "SearXNG queries Google, Bing, and Brave simultaneously. Results are ranked using Reciprocal Rank Fusion."
how_step3_title: "AI reads & answers"
how_step3_desc: "Apple Intelligence on your device reads the top sources and generates a comprehensive answer with citations."

# Server / Infrastructure
server_title: "Our Infrastructure"
server_subtitle: "Everything is designed for privacy and transparency."
server_searxng_title: "Self-Hosted SearXNG"
server_searxng_desc: "Our search server runs on Hetzner in Helsinki, Finland. EU jurisdiction, GDPR-compliant hosting. No logs, no tracking."
server_security_title: "Security Hardened"
server_security_desc: "SSH key-only access, fail2ban, UFW firewall, automatic security updates. TLS certificates auto-provisioned by Caddy."
server_privacy_title: "Zero Logging"
server_privacy_desc: "Docker containers run with logging disabled. DNS queries go through Quad9. No request logs, no IP logging, no analytics."
server_cost_title: "Transparent & Lean"
server_cost_desc: "The entire infrastructure costs under €5/month. No venture capital, no growth metrics, no reason to monetize your data."
server_open_title: "Open Source"
server_open_desc: "AISight is fully open source under the MIT license. Inspect every line of code — nothing is hidden."
server_eu_title: "EU-Based"
server_eu_desc: "Server in Finland, developer in Spain. All data processing under EU jurisdiction and GDPR protection."

# Deep Search
deep_title: "Deep Search"
deep_desc: "For complex questions, Deep Search uses multiple AI research passes to find better answers. It reformulates your query, runs parallel searches, and synthesizes results from multiple angles."

