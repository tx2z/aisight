# FAQ
faq_title: "Frequently Asked Questions"
faq_q1: "Is AISight really private?"
faq_a1: "Yes. All AI processing happens on your device using Apple Intelligence (FoundationModels framework). Your queries, search results, and generated answers never leave your device. There are no analytics, no tracking, no user accounts, and no cloud AI services involved."
faq_q2: "How is AISight different from Perplexity?"
faq_a2: "Unlike Perplexity, AISight processes everything on-device. Your queries never reach a cloud AI service. Search goes through SearXNG (a privacy-respecting open-source metasearch engine) instead of proprietary search APIs. The entire app is open source under the MIT license, and all infrastructure is EU-based."
faq_q3: "What devices does AISight support?"
faq_a3: "AISight requires iPhone 15 Pro or later, iPad with M1 chip or later, or any Mac with Apple Silicon. You need iOS 26 / macOS 26 or later with Apple Intelligence enabled."
faq_q4: "What is SearXNG?"
faq_a4: "SearXNG is a free, open-source metasearch engine that aggregates results from multiple search engines (Google, Bing, Brave, Wikipedia, and more) without tracking users. AISight ships with a default SearXNG server hosted in Helsinki, Finland (EU jurisdiction)."
faq_q5: "Is AISight free?"
faq_a5: "AISight offers 10 free searches per day. AISight Pro ($4.99, one-time purchase) removes this limit, unlocks Deep Search, and allows you to configure a custom SearXNG server."
faq_q6: "What is Deep Search?"
faq_a6: "Deep Search is an advanced mode that uses multiple AI research passes to find better answers for complex questions. It reformulates your query, runs parallel searches from different angles, and synthesizes the results into a comprehensive answer."
faq_q7: "Where is the server located?"
faq_a7: "Our SearXNG search server runs on Hetzner in Helsinki, Finland. EU jurisdiction, GDPR-compliant hosting. The server has zero logging enabled — no request logs, no IP logs, no analytics of any kind."
faq_q8: "Is the AI quality good enough?"
faq_a8: "Apple Intelligence is a capable ~3B parameter model optimized for on-device use. It handles everyday questions, research, and fact-checking well. For complex reasoning or creative tasks, cloud models like GPT-4 may be stronger — but your queries stay private, which we think is a worthwhile trade-off."
faq_q9: "Is AISight available on Android?"
faq_a9: "AISight is currently available for Apple devices only (iPhone, iPad, Mac) as it relies on Apple Intelligence for on-device AI processing. There is no Android equivalent of this technology at this time."

