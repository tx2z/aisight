# Trade-offs
tradeoffs_title: "An honest trade-off"
tradeoffs_desc: "AISight uses Apple Intelligence, a ~3B parameter model that runs entirely on your device. It won't match GPT-4 on complex reasoning or creative writing — but for everyday questions, research, and fact-checking, it delivers fast, sourced answers without anyone watching. We believe that trade-off is worth it."

