faq_title: "Häufig gestellte Fragen"
faq_q1: "Ist AISight wirklich privat?"
faq_a1: "Ja. Die gesamte KI-Verarbeitung findet auf Ihrem Gerät mit Apple Intelligence (FoundationModels-Framework) statt. Ihre Anfragen, Suchergebnisse und generierten Antworten verlassen nie Ihr Gerät. Es gibt keine Analytik, kein Tracking, keine Benutzerkonten und keine Cloud-KI-Dienste."
faq_q2: "Wie unterscheidet sich AISight von Perplexity?"
faq_a2: 'Anders als Perplexity verarbeitet AISight alles auf dem Gerät. Ihre Anfragen erreichen nie einen Cloud-KI-Dienst. Die Suche läuft über SearXNG (eine datenschutzfreundliche Open-Source-Metasuchmaschine) statt über proprietäre Such-APIs. Die gesamte App ist <a href="https://github.com/tx2z/aisight" target="_blank" rel="noopener">Open Source unter MIT-Lizenz</a>, und die gesamte Infrastruktur befindet sich in der EU.'
faq_q3: "Welche Geräte unterstützt AISight?"
faq_a3: "AISight erfordert iPhone 15 Pro oder neuer, iPad mit M1-Chip oder neuer, oder jeden Mac mit Apple Silicon. Sie benötigen iOS 26 / macOS 26 oder neuer mit aktivierter Apple Intelligence."
faq_q4: "Was ist SearXNG?"
faq_a4: "SearXNG ist eine kostenlose Open-Source-Metasuchmaschine, die Ergebnisse von mehreren Suchmaschinen (Google, Bing, Brave, Wikipedia und mehr) aggregiert, ohne Benutzer zu verfolgen. AISight wird mit einem Standard-SearXNG-Server in Helsinki, Finnland (EU-Gerichtsbarkeit) ausgeliefert."
faq_q5: "Ist AISight kostenlos?"
faq_a5: "AISight bietet 10 kostenlose Suchen pro Tag auf unserem Standardserver. AISight Pro (4,99 €, einmalig) hebt dieses Limit auf und schaltet Deep Search frei. Oder bringen Sie Ihren eigenen SearXNG-Server mit — alle Funktionen werden kostenlos freigeschaltet, kein Kauf nötig."
faq_q6: "Was ist die Tiefensuche?"
faq_a6: "Die Tiefensuche ist ein erweiterter Modus, der mehrere KI-Recherche-Durchgänge nutzt, um bessere Antworten auf komplexe Fragen zu finden. Er formuliert Ihre Anfrage um, führt parallele Suchen aus verschiedenen Blickwinkeln durch und fasst die Ergebnisse zu einer umfassenden Antwort zusammen."
faq_q7: "Wo befindet sich der Server?"
faq_a7: "Unser SearXNG-Suchserver läuft auf Hetzner in Helsinki, Finnland. EU-Gerichtsbarkeit, DSGVO-konformes Hosting. Der Server hat keinerlei Protokollierung aktiviert — keine Request-Logs, keine IP-Logs, keinerlei Analytik."
faq_q8: "Ist die KI-Qualität gut genug?"
faq_a8: "Apple Intelligence ist ein leistungsfähiges ~3B-Parameter-Modell, optimiert für die Nutzung auf dem Gerät. Es bewältigt alltägliche Fragen, Recherche und Faktenprüfung gut. Für komplexes Denken oder kreative Aufgaben können Cloud-Modelle wie GPT-4 stärker sein — aber Ihre Anfragen bleiben privat, was wir für einen lohnenden Kompromiss halten."
faq_q9: "Ist AISight für Android verfügbar?"
faq_a9: "AISight ist derzeit nur für Apple-Geräte (iPhone, iPad, Mac) verfügbar, da es auf Apple Intelligence für die KI-Verarbeitung auf dem Gerät angewiesen ist. Es gibt derzeit keine vergleichbare Technologie auf Android."
