tradeoffs_title: "Ein ehrlicher Kompromiss"
tradeoffs_desc: "AISight nutzt Apple Intelligence, ein ~3B-Parameter-Modell, das vollständig auf Ihrem Gerät läuft. Es wird GPT-4 bei komplexem Denken oder kreativem Schreiben nicht erreichen — aber für alltägliche Fragen, Recherche und Faktenprüfung liefert es schnelle, quellenbasierte Antworten, ohne dass jemand zuschaut. Wir glauben, dieser Kompromiss lohnt sich."
