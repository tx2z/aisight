features_title: "Warum AISight?"
features_subtitle: "Eine Perplexity-Alternative, die Ihre Privatsphäre wirklich respektiert."
feat_privacy_title: "Echte Privatsphäre"
feat_privacy_desc: "Keine Analytik, kein Tracking, keine Konten, keine Werbung. Ihre Suchen bleiben auf Ihrem Gerät."
feat_ai_title: "KI auf dem Gerät"
feat_ai_desc: "Antworten werden lokal mit Apple Intelligence generiert. Ihre Anfragen erreichen nie einen Cloud-KI-Dienst."
feat_search_title: "Private Suche"
feat_search_desc: "Suchen laufen über SearXNG — eine Open-Source-Metasuchmaschine, die Sie nicht verfolgt."
feat_citations_title: "Zitierte Quellen"
feat_citations_desc: "Jede Antwort enthält nummerierte Zitate mit Links zu den Originalquellen zur Überprüfung."
feat_universal_title: "iPhone, iPad & Mac"
feat_universal_desc: "Native App mit SwiftUI. Läuft auf iPhone 15 Pro+, iPad M1+ und jedem Apple Silicon Mac."
feat_fast_title: "Sofortige Antworten"
feat_fast_desc: "Ergebnisse werden in Echtzeit gestreamt, während das lokale Modell sie generiert."
how_title: "So funktioniert's"
how_subtitle: "Von der Frage zur Antwort in Sekunden — alles auf Ihrem Gerät."
how_step1_title: "Sie stellen eine Frage"
how_step1_desc: "Geben Sie eine Frage ein. AISight sendet sie an einen datenschutzfreundlichen SearXNG-Suchserver."
how_step2_title: "Webergebnisse kommen zurück"
how_step2_desc: "SearXNG befragt Google, Bing und Brave gleichzeitig. Ergebnisse werden per Reciprocal Rank Fusion sortiert."
how_step3_title: "KI liest und antwortet"
how_step3_desc: "Apple Intelligence auf Ihrem Gerät liest die besten Quellen und generiert eine Antwort mit Zitaten."
server_title: "Unsere Infrastruktur"
server_subtitle: "Alles ist für Datenschutz und Transparenz konzipiert."
server_searxng_title: "Selbst gehostetes SearXNG"
server_searxng_desc: "Unser Suchserver läuft auf Hetzner in Helsinki, Finnland. EU-Gerichtsbarkeit, DSGVO-konformes Hosting."
server_security_title: "Sicherheitsgehärtet"
server_security_desc: "Nur SSH-Schlüssel-Zugang, fail2ban, UFW-Firewall, automatische Updates. TLS-Zertifikate von Caddy."
server_privacy_title: "Keine Protokollierung"
server_privacy_desc: "Docker-Container laufen ohne Logging. DNS-Anfragen über Quad9. Keine Request-Logs, keine IP-Protokolle."
server_cost_title: "Transparent & schlank"
server_cost_desc: "Die gesamte Infrastruktur kostet unter 5€/Monat. Kein Risikokapital, keine Wachstumsmetriken."
server_open_title: "Open Source"
server_open_desc: "AISight ist vollständig Open Source unter MIT-Lizenz. Prüfen Sie jede Zeile Code."
server_eu_title: "EU-basiert"
server_eu_desc: "Server in Finnland, Entwickler in Spanien. Gesamte Datenverarbeitung unter EU-Recht und DSGVO-Schutz."
deep_title: "Tiefensuche"
deep_desc: "Für komplexe Fragen nutzt die Tiefensuche mehrere KI-Recherche-Durchgänge für bessere Antworten."
cta_title: "Bereit für private Antworten?"
cta_desc: "Laden Sie AISight herunter und übernehmen Sie die Kontrolle über Ihre Suche."
