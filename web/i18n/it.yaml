faq_title: "Domande frequenti"
faq_q1: "AISight è davvero privato?"
faq_a1: "Sì. Tutta l'elaborazione IA avviene sul tuo dispositivo usando Apple Intelligence (framework FoundationModels). Le tue query, i risultati di ricerca e le risposte generate non lasciano mai il tuo dispositivo. Non ci sono analitiche, tracciamento, account utente o servizi IA cloud coinvolti."
faq_q2: "In cosa AISight è diverso da Perplexity?"
faq_a2: "A differenza di Perplexity, AISight elabora tutto sul dispositivo. Le tue query non raggiungono mai un servizio IA cloud. La ricerca passa da SearXNG (un metamotore open source rispettoso della privacy) invece che da API di ricerca proprietarie. L'intera app è <a href=\"https://github.com/tx2z/aisight\" target=\"_blank\" rel=\"noopener\">open source sotto licenza MIT</a>, e tutta l'infrastruttura è basata nell'UE."
faq_q3: "Quali dispositivi supporta AISight?"
faq_a3: "AISight richiede iPhone 15 Pro o successivo, iPad con chip M1 o successivo, o qualsiasi Mac con Apple Silicon. È necessario iOS 26 / macOS 26 o successivo con Apple Intelligence attivato."
faq_q4: "Cos'è SearXNG?"
faq_a4: "SearXNG è un metamotore di ricerca gratuito e open source che aggrega risultati da più motori di ricerca (Google, Bing, Brave, Wikipedia e altri) senza tracciare gli utenti. AISight include un server SearXNG predefinito ospitato a Helsinki, Finlandia (giurisdizione UE)."
faq_q5: "AISight è gratuito?"
faq_a5: "AISight offre 10 ricerche gratuite al giorno sul nostro server predefinito. AISight Pro (4,99 €, acquisto unico) rimuove questo limite e sblocca Deep Search. Oppure collega il tuo server SearXNG — tutte le funzionalità si sbloccano gratis, senza acquisti."
faq_q6: "Cos'è la Ricerca Profonda?"
faq_a6: "La Ricerca Profonda è una modalità avanzata che usa più passaggi di ricerca IA per trovare risposte migliori a domande complesse. Riformula la tua query, esegue ricerche parallele da angolazioni diverse e sintetizza i risultati in una risposta completa."
faq_q7: "Dove si trova il server?"
faq_a7: "Il nostro server di ricerca SearXNG funziona su Hetzner a Helsinki, Finlandia. Giurisdizione UE, hosting conforme al GDPR. Il server ha zero logging abilitato — nessun log di richieste, nessun log IP, nessuna analitica di alcun tipo."
faq_q8: "La qualità dell'IA è sufficiente?"
faq_a8: "Apple Intelligence è un modello capace di ~3B parametri ottimizzato per l'uso sul dispositivo. Gestisce bene le domande quotidiane, la ricerca e la verifica dei fatti. Per il ragionamento complesso o i compiti creativi, i modelli cloud come GPT-4 possono essere più potenti — ma le tue query restano private, il che riteniamo sia un compromesso che vale la pena."
faq_q9: "AISight è disponibile su Android?"
faq_a9: "AISight è attualmente disponibile solo per dispositivi Apple (iPhone, iPad, Mac) poiché si basa su Apple Intelligence per l'elaborazione IA sul dispositivo. Al momento non esiste una tecnologia equivalente su Android."
