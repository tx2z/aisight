server_searxng_desc: "Il nostro server di ricerca funziona su Hetzner a Helsinki, Finlandia. Giurisdizione UE, hosting conforme al GDPR."
server_security_title: "Sicurezza rafforzata"
server_security_desc: "Accesso solo con chiave SSH, fail2ban, firewall UFW, aggiornamenti automatici. Certificati TLS da Caddy."
server_privacy_title: "Zero log"
server_privacy_desc: "I container Docker funzionano senza logging. Le query DNS vanno via Quad9. Nessun log di richieste o IP."
server_cost_title: "Trasparente e snello"
server_cost_desc: "L'intera infrastruttura costa meno di 5€/mese. Nessun capitale di rischio, nessuna metrica di crescita."
