badge_opensource: "Open source"
features_title: "Perché AISight?"
features_subtitle: "Un'alternativa a Perplexity che rispetta davvero la tua privacy."
feat_privacy_title: "Vera privacy"
feat_privacy_desc: "Nessuna analitica, nessun tracciamento, nessun account, nessuna pubblicità. Le tue ricerche restano sul tuo dispositivo."
feat_ai_title: "IA sul dispositivo"
feat_ai_desc: "Le risposte sono generate localmente con Apple Intelligence. Le tue query non toccano mai un servizio IA cloud."
feat_search_title: "Ricerca privata"
feat_search_desc: "Le ricerche passano da SearXNG — un metamotore open source che non ti traccia."
feat_citations_title: "Fonti citate"
feat_citations_desc: "Ogni risposta include citazioni numerate con link alle fonti originali per la verifica."
feat_universal_title: "iPhone, iPad e Mac"
feat_universal_desc: "App nativa in SwiftUI. Funziona su iPhone 15 Pro+, iPad M1+ e qualsiasi Mac Apple Silicon."
feat_fast_title: "Risposte istantanee"
feat_fast_desc: "I risultati arrivano in tempo reale mentre il modello locale li genera."
how_title: "Come funziona"
how_subtitle: "Dalla domanda alla risposta in secondi — tutto sul tuo dispositivo."
how_step1_title: "Fai una domanda"
how_step1_desc: "Scrivi qualsiasi domanda. AISight la invia a un server SearXNG rispettoso della privacy."
how_step2_title: "Arrivano i risultati"
how_step2_desc: "SearXNG interroga Google, Bing e Brave contemporaneamente. I risultati sono classificati con Reciprocal Rank Fusion."
how_step3_title: "L'IA legge e risponde"
how_step3_desc: "Apple Intelligence sul tuo dispositivo legge le migliori fonti e genera una risposta con citazioni."
server_title: "La nostra infrastruttura"
server_subtitle: "Tutto è progettato per la privacy e la trasparenza."
server_searxng_title: "SearXNG self-hosted"
server_searxng_desc: "Il nostro server di ricerca funziona su Hetzner a Helsinki, Finlandia. Giurisdizione UE, hosting conforme al GDPR."
server_security_title: "Sicurezza rafforzata"
server_security_desc: "Accesso solo con chiave SSH, fail2ban, firewall UFW, aggiornamenti automatici. Certificati TLS da Caddy."
server_privacy_title: "Zero log"
server_privacy_desc: "I container Docker funzionano senza logging. Le query DNS vanno via Quad9. Nessun log di richieste o IP."
server_cost_title: "Trasparente e snello"
server_cost_desc: "L'intera infrastruttura costa meno di 5€/mese. Nessun capitale di rischio, nessuna metrica di crescita."
server_open_title: "Open source"
server_open_desc: "AISight è completamente open source con licenza MIT. Ispeziona ogni riga di codice."
server_eu_title: "Basato nell'UE"
server_eu_desc: "Server in Finlandia, sviluppatore in Spagna. Tutta l'elaborazione sotto giurisdizione UE e protezione GDPR."
deep_title: "Ricerca profonda"
deep_desc: "Per domande complesse, la ricerca profonda usa più passaggi di ricerca IA per trovare risposte migliori."
cta_title: "Pronto per risposte private?"
cta_desc: "Scarica AISight e prendi il controllo della tua ricerca."
contact_title: "Contatti"
contact_intro: "Hai domande, feedback o suggerimenti? Ci piacerebbe sentirti."
