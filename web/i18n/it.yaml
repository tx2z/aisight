hero_title: "Cerca in privato."
hero_title_2: "Rispondi con intelligenza."
hero_subtitle: "AISight cerca nel web e genera risposte direttamente sul tuo dispositivo con Apple Intelligence. Nessun dato nel cloud. Nessun tracciamento."
hero_cta: "Scarica dall'App Store"
hero_cta_soon: "Prossimamente sull'App Store"
badge_private: "100% Privato"
badge_ondevice: "IA sul dispositivo"
