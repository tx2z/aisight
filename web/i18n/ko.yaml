tradeoffs_desc: "AISight는 기기에서 완전히 실행되는 ~3B 파라미터 모델인 Apple Intelligence를 사용합니다. 복잡한 추론이나 창작 글쓰기에서 GPT-4에 미치지 못하지만, 일상적인 질문, 조사, 팩트체크에는 아무도 보지 않는 상태에서 빠르고 출처가 있는 답변을 제공합니다. 이 트레이드오프는 가치가 있다고 믿습니다."
