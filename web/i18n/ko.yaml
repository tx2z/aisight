server_eu_title: "EU 기반"
server_eu_desc: "서버는 핀란드, 개발자는 스페인. EU 관할권과 GDPR 보호 하의 모든 데이터 처리."
deep_title: "딥 서치"
deep_desc: "복잡한 질문의 경우 딥 서치가 여러 AI 조사 패스를 사용하여 더 나은 답변을 찾습니다."
faq_title: "자주 묻는 질문"
faq_q1: "AISight는 정말 프라이빗한가요?"
faq_a1: "네. 모든 AI 처리는 Apple Intelligence(FoundationModels 프레임워크)를 사용하여 기기에서 이루어집니다. 쿼리, 검색 결과, 생성된 답변은 기기를 떠나지 않습니다. 분석, 추적, 사용자 계정, 클라우드 AI 서비스가 전혀 관여하지 않습니다."
faq_q2: "AISight는 Perplexity와 어떻게 다른가요?"
faq_a2: "Perplexity와 달리 AISight는 모든 것을 기기에서 처리합니다. 쿼리가 클라우드 AI 서비스에 도달하지 않습니다. 검색은 독점 검색 API가 아닌 SearXNG(프라이버시를 존중하는 오픈소스 메타검색엔진)를 통해 이루어집니다. 전체 앱이 MIT 라이선스로 오픈소스이며, 모든 인프라는 EU에 기반합니다."
faq_q3: "AISight는 어떤 기기를 지원하나요?"
faq_a3: "AISight는 iPhone 15 Pro 이상, M1 칩 이상의 iPad, 또는 Apple Silicon이 탑재된 모든 Mac이 필요합니다. Apple Intelligence가 활성화된 iOS 26 / macOS 26 이상이 필요합니다."
faq_q4: "SearXNG란 무엇인가요?"
faq_a4: "SearXNG는 사용자를 추적하지 않고 여러 검색 엔진(Google, Bing, Brave, Wikipedia 등)의 결과를 집계하는 무료 오픈소스 메타검색엔진입니다. AISight에는 핀란드 헬싱키(EU 관할권)에 호스팅된 기본 SearXNG 서버가 포함되어 있습니다."
faq_q5: "AISight는 무료인가요?"
faq_a5: "AISight는 하루 10회 무료 검색을 제공합니다. AISight Pro($4.99, 일회성 구매)는 이 제한을 해제하고, 딥 서치를 잠금 해제하며, 커스텀 SearXNG 서버를 구성할 수 있게 합니다."
faq_q6: "딥 서치란 무엇인가요?"
faq_a6: "딥 서치는 복잡한 질문에 대해 더 나은 답변을 찾기 위해 여러 AI 조사 패스를 사용하는 고급 모드입니다. 쿼리를 재구성하고, 다양한 각도에서 병렬 검색을 실행하며, 결과를 종합적인 답변으로 합성합니다."
faq_q7: "서버는 어디에 있나요?"
faq_a7: "SearXNG 검색 서버는 핀란드 헬싱키의 Hetzner에서 운영됩니다. EU 관할권, GDPR 준수 호스팅. 서버는 제로 로깅이 활성화되어 있습니다 — 요청 로그 없음, IP 로그 없음, 어떤 종류의 분석도 없음."
faq_q8: "AI 품질이 충분한가요?"
faq_a8: "Apple Intelligence는 온디바이스 사용에 최적화된 ~3B 파라미터의 유능한 모델입니다. 일상적인 질문, 조사, 팩트체크를 잘 처리합니다. 복잡한 추론이나 창작 작업에서는 GPT-4 같은 클라우드 모델이 더 강할 수 있지만, 쿼리가 프라이빗하게 유지되며 이것이 가치 있는 트레이드오프라고 생각합니다."
faq_q9: "AISight는 Android에서 사용할 수 있나요?"
faq_a9: "AISight는 현재 온디바이스 AI 처리를 위해 Apple Intelligence에 의존하기 때문에 Apple 기기(iPhone, iPad, Mac)에서만 사용 가능합니다. 현재 Android에는 동등한 기술이 없습니다."
