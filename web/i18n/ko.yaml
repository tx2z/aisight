features_title: "왜 AISight인가요?"
features_subtitle: "프라이버시를 진정으로 존중하는 Perplexity 대안."
feat_privacy_title: "진정한 프라이버시"
feat_privacy_desc: "분석 없음, 추적 없음, 계정 없음, 광고 없음. 검색은 기기에 남습니다."
feat_ai_title: "온디바이스 AI"
feat_ai_desc: "답변은 Apple Intelligence로 로컬에서 생성됩니다. 쿼리가 클라우드 AI 서비스에 도달하지 않습니다."
feat_search_title: "프라이빗 검색"
feat_search_desc: "검색은 SearXNG를 통해 진행 — 추적하지 않는 오픈소스 메타검색엔진."
feat_citations_title: "출처 인용"
feat_citations_desc: "모든 답변에 원본 출처로의 링크가 포함된 번호 인용이 포함됩니다."
feat_universal_title: "iPhone, iPad & Mac"
feat_universal_desc: "SwiftUI 네이티브 앱. iPhone 15 Pro 이상, M1+ iPad, 모든 Apple Silicon Mac 지원."
feat_fast_title: "즉각적인 답변"
feat_fast_desc: "로컬 모델이 생성하는 결과가 실시간으로 스트리밍됩니다."
how_title: "작동 방식"
how_subtitle: "질문에서 답변까지 몇 초 — 모두 기기에서."
how_step1_title: "질문하기"
how_step1_desc: "아무 질문이나 입력하세요. AISight가 프라이버시를 존중하는 SearXNG 검색 서버로 전송합니다."
how_step2_title: "웹 결과 도착"
how_step2_desc: "SearXNG가 Google, Bing, Brave에 동시에 쿼리합니다. Reciprocal Rank Fusion으로 결과를 순위 매깁니다."
how_step3_title: "AI가 읽고 답변"
how_step3_desc: "기기의 Apple Intelligence가 상위 출처를 읽고 인용이 포함된 포괄적인 답변을 생성합니다."
server_title: "인프라스트럭처"
server_subtitle: "모든 것이 프라이버시와 투명성을 위해 설계되었습니다."
server_searxng_title: "셀프호스트 SearXNG"
server_searxng_desc: "검색 서버는 핀란드 헬싱키의 Hetzner에서 운영됩니다. EU 관할권, GDPR 준수 호스팅."
server_security_title: "보안 강화"
server_security_desc: "SSH 키 전용 접근, fail2ban, UFW 방화벽, 자동 보안 업데이트. Caddy 자동 TLS 인증서."
server_privacy_title: "제로 로깅"
server_privacy_desc: "Docker 컨테이너는 로깅 비활성화로 실행. DNS 쿼리는 Quad9 경유. 요청 로그 없음, IP 로그 없음."
server_cost_title: "투명하고 가벼운"
server_cost_desc: "전체 인프라 비용 월 5유로 미만. 벤처 캐피탈 없음, 성장 지표 없음."
server_open_title: "오픈소스"
server_open_desc: "AISight는 MIT 라이선스로 완전 오픈소스입니다. 모든 코드 라인을 검사하세요."
server_eu_title: "EU 기반"
server_eu_desc: "서버는 핀란드, 개발자는 스페인. EU 관할권과 GDPR 보호 하의 모든 데이터 처리."
deep_title: "딥 서치"
deep_desc: "복잡한 질문의 경우 딥 서치가 여러 AI 조사 패스를 사용하여 더 나은 답변을 찾습니다."
cta_title: "프라이빗 답변 준비되셨나요?"
cta_desc: "AISight를 다운로드하고 검색을 통제하세요."
