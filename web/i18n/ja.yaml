faq_title: "よくある質問"
faq_q1: "AISightは本当にプライベートですか？"
faq_a1: "はい。すべてのAI処理はApple Intelligence（FoundationModelsフレームワーク）を使用してデバイス上で行われます。クエリ、検索結果、生成された回答がデバイスから出ることはありません。分析、トラッキング、ユーザーアカウント、クラウドAIサービスは一切関与しません。"
faq_q2: "AISightはPerplexityとどう違いますか？"
faq_a2: 'Perplexityとは異なり、AISightはすべてをデバイス上で処理します。クエリがクラウドAIサービスに到達することはありません。検索はプロプライエタリな検索APIではなく、SearXNG（プライバシーを尊重するオープンソースメタ検索エンジン）を経由します。アプリ全体が<a href="https://github.com/tx2z/aisight" target="_blank" rel="noopener">MITライセンスでオープンソース</a>であり、すべてのインフラはEUベースです。'
faq_q3: "AISightはどのデバイスに対応していますか？"
faq_a3: "AISightはiPhone 15 Pro以降、M1チップ以降のiPad、またはApple Siliconを搭載したすべてのMacが必要です。Apple Intelligenceが有効なiOS 26 / macOS 26以降が必要です。"
faq_q4: "SearXNGとは何ですか？"
faq_a4: "SearXNGは、複数の検索エンジン（Google、Bing、Brave、Wikipediaなど）からの結果をユーザーを追跡せずに集約する、無料のオープンソースメタ検索エンジンです。AISightには、フィンランド・ヘルシンキ（EU管轄）でホストされているデフォルトのSearXNGサーバーが付属しています。"
faq_q5: "AISightは無料ですか？"
faq_a5: "AISightはデフォルトサーバーで1日10回の無料検索を提供します。AISight Pro（¥800、買い切り）はこの制限を解除し、ディープサーチをアンロックします。または、自分のSearXNGサーバーを接続すれば、すべての機能が無料でアンロックされます。購入は不要です。"
faq_q6: "ディープサーチとは何ですか？"
faq_a6: "ディープサーチは、複雑な質問に対してより良い回答を見つけるために複数のAI調査パスを使用する高度なモードです。クエリを再構成し、異なる角度から並列検索を実行し、結果を包括的な回答に統合します。"
faq_q7: "サーバーはどこにありますか？"
faq_a7: "当社のSearXNG検索サーバーはフィンランド・ヘルシンキのHetznerで稼働しています。EU管轄、GDPR準拠ホスティング。サーバーはゼロログが有効 — リクエストログなし、IPログなし、いかなる種類の分析もなし。"
faq_q8: "AIの品質は十分ですか？"
faq_a8: "Apple Intelligenceはデバイス上での使用に最適化された~3Bパラメータの優れたモデルです。日常の質問、調査、ファクトチェックをうまく処理します。複雑な推論やクリエイティブなタスクでは、GPT-4のようなクラウドモデルの方が強力かもしれませんが、クエリはプライベートに保たれます。これは価値あるトレードオフだと考えています。"
faq_q9: "AISightはAndroidで利用できますか？"
faq_a9: "AISightは現在、Apple Intelligence によるデバイス上でのAI処理に依存しているため、Appleデバイス（iPhone、iPad、Mac）でのみ利用可能です。現時点でAndroidに同等の技術はありません。"
