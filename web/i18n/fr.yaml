faq_title: "Questions fréquentes"
faq_q1: "AISight est-il vraiment privé ?"
faq_a1: "Oui. Tout le traitement IA se fait sur votre appareil avec Apple Intelligence (framework FoundationModels). Vos requêtes, résultats de recherche et réponses générées ne quittent jamais votre appareil. Il n'y a ni analytique, ni suivi, ni comptes utilisateur, ni services IA cloud impliqués."
faq_q2: "En quoi AISight est-il différent de Perplexity ?"
faq_a2: "Contrairement à Perplexity, AISight traite tout sur l'appareil. Vos requêtes n'atteignent jamais un service IA cloud. La recherche passe par SearXNG (un métamoteur open source respectueux de la vie privée) au lieu d'API de recherche propriétaires. L'application entière est open source sous licence MIT, et toute l'infrastructure est basée dans l'UE."
faq_q3: "Quels appareils AISight prend-il en charge ?"
faq_a3: "AISight nécessite un iPhone 15 Pro ou ultérieur, un iPad avec puce M1 ou ultérieur, ou tout Mac avec Apple Silicon. Vous avez besoin d'iOS 26 / macOS 26 ou ultérieur avec Apple Intelligence activé."
faq_q4: "Qu'est-ce que SearXNG ?"
faq_a4: "SearXNG est un métamoteur de recherche gratuit et open source qui agrège les résultats de plusieurs moteurs de recherche (Google, Bing, Brave, Wikipedia et plus) sans suivre les utilisateurs. AISight est livré avec un serveur SearXNG par défaut hébergé à Helsinki, Finlande (juridiction UE)."
faq_q5: "AISight est-il gratuit ?"
faq_a5: "AISight offre 20 recherches gratuites par jour. AISight Pro ($4.99, achat unique) supprime cette limite et permet de configurer un serveur SearXNG personnalisé."
faq_q6: "Qu'est-ce que la recherche approfondie ?"
faq_a6: "La recherche approfondie est un mode avancé qui utilise plusieurs passes de recherche IA pour trouver de meilleures réponses aux questions complexes. Elle reformule votre requête, lance des recherches parallèles sous différents angles et synthétise les résultats en une réponse complète."
faq_q7: "Où se trouve le serveur ?"
faq_a7: "Notre serveur de recherche SearXNG fonctionne chez Hetzner à Helsinki, Finlande. Juridiction UE, hébergement conforme au RGPD. Le serveur a zéro journalisation activée — aucun log de requêtes, aucun log d'IP, aucune analytique d'aucune sorte."
faq_q8: "La qualité de l'IA est-elle suffisante ?"
faq_a8: "Apple Intelligence est un modèle capable de ~3B paramètres optimisé pour l'utilisation sur appareil. Il gère bien les questions quotidiennes, la recherche et la vérification des faits. Pour le raisonnement complexe ou les tâches créatives, les modèles cloud comme GPT-4 peuvent être plus performants — mais vos requêtes restent privées, ce que nous considérons comme un compromis qui en vaut la peine."
faq_q9: "AISight est-il disponible sur Android ?"
faq_a9: "AISight est actuellement disponible uniquement pour les appareils Apple (iPhone, iPad, Mac) car il repose sur Apple Intelligence pour le traitement IA sur appareil. Il n'existe pas d'équivalent de cette technologie sur Android pour le moment."
