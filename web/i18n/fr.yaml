tradeoffs_title: "Un compromis honnête"
tradeoffs_desc: "AISight utilise Apple Intelligence, un modèle de ~3B paramètres qui s'exécute entièrement sur votre appareil. Il n'égalera pas GPT-4 en raisonnement complexe ou écriture créative — mais pour les questions quotidiennes, la recherche et la vérification des faits, il fournit des réponses rapides et sourcées sans que personne ne regarde. Nous pensons que ce compromis en vaut la peine."
