features_title: "Pourquoi AISight ?"
features_subtitle: "Une alternative à Perplexity qui respecte vraiment votre vie privée."
feat_privacy_title: "Vraie confidentialité"
feat_privacy_desc: "Pas d'analytique, pas de suivi, pas de comptes, pas de publicités. Vos recherches restent sur votre appareil."
feat_ai_title: "IA sur l'appareil"
feat_ai_desc: "Les réponses sont générées localement avec Apple Intelligence. Vos requêtes ne touchent jamais un service IA cloud."
feat_search_title: "Recherche privée"
feat_search_desc: "Les recherches passent par SearXNG — un métamoteur open source qui ne vous piste pas."
feat_citations_title: "Sources citées"
feat_citations_desc: "Chaque réponse inclut des citations numérotées avec des liens vers les sources originales."
feat_universal_title: "iPhone, iPad et Mac"
feat_universal_desc: "Application native en SwiftUI. Fonctionne sur iPhone 15 Pro+, iPad M1+ et tout Mac Apple Silicon."
feat_fast_title: "Réponses instantanées"
feat_fast_desc: "Les résultats arrivent en temps réel pendant que le modèle local les génère."
how_title: "Comment ça marche"
how_subtitle: "De la question à la réponse en secondes — tout sur votre appareil."
how_step1_title: "Vous posez une question"
how_step1_desc: "Tapez n'importe quelle question. AISight l'envoie à un serveur SearXNG respectueux de la vie privée."
how_step2_title: "Les résultats arrivent"
how_step2_desc: "SearXNG interroge Google, Bing et Brave simultanément. Les résultats sont classés par Reciprocal Rank Fusion."
how_step3_title: "L'IA lit et répond"
how_step3_desc: "Apple Intelligence sur votre appareil lit les meilleures sources et génère une réponse avec des citations."
server_title: "Notre infrastructure"
server_subtitle: "Tout est conçu pour la confidentialité et la transparence."
server_searxng_title: "SearXNG auto-hébergé"
server_searxng_desc: "Notre serveur de recherche fonctionne chez Hetzner à Helsinki, Finlande. Juridiction UE, hébergement conforme au RGPD."
server_security_title: "Sécurité renforcée"
server_security_desc: "Accès SSH par clé uniquement, fail2ban, pare-feu UFW, mises à jour automatiques. Certificats TLS par Caddy."
server_privacy_title: "Zéro journalisation"
server_privacy_desc: "Les conteneurs Docker tournent sans logs. Les requêtes DNS passent par Quad9. Aucun log de requêtes ni d'IP."
server_cost_title: "Transparent et léger"
server_cost_desc: "Toute l'infrastructure coûte moins de 5€/mois. Pas de capital-risque, pas de métriques de croissance."
server_open_title: "Open source"
server_open_desc: "AISight est entièrement open source sous licence MIT. Inspectez chaque ligne de code."
server_eu_title: "Basé dans l'UE"
server_eu_desc: "Serveur en Finlande, développeur en Espagne. Tout le traitement sous juridiction UE et protection RGPD."
deep_title: "Recherche approfondie"
deep_desc: "Pour les questions complexes, la recherche approfondie utilise plusieurs passes de recherche IA pour de meilleures réponses."
cta_title: "Prêt pour des réponses privées ?"
cta_desc: "Téléchargez AISight et prenez le contrôle de votre recherche."
