faq_title: "常见问题"
faq_q1: "AISight真的是私密的吗？"
faq_a1: "是的。所有AI处理都在您的设备上使用Apple Intelligence（FoundationModels框架）进行。您的查询、搜索结果和生成的答案永远不会离开您的设备。没有分析、没有追踪、没有用户账户、没有云端AI服务。"
faq_q2: "AISight与Perplexity有什么不同？"
faq_a2: '与Perplexity不同，AISight在设备上处理所有内容。您的查询永远不会到达云端AI服务。搜索通过SearXNG（一个尊重隐私的开源元搜索引擎）而非专有搜索API进行。整个应用在<a href="https://github.com/tx2z/aisight" target="_blank" rel="noopener">MIT许可下开源</a>，所有基础设施都在欧盟。'
faq_q3: "AISight支持哪些设备？"
faq_a3: "AISight需要iPhone 15 Pro或更新款、配备M1芯片或更新款的iPad、或任何搭载Apple Silicon的Mac。您需要iOS 26 / macOS 26或更高版本，并启用Apple Intelligence。"
faq_q4: "什么是SearXNG？"
faq_a4: "SearXNG是一个免费的开源元搜索引擎，它聚合来自多个搜索引擎（Google、Bing、Brave、Wikipedia等）的结果，而不追踪用户。AISight配备了一个默认的SearXNG服务器，托管在芬兰赫尔辛基（欧盟管辖权）。"
faq_q5: "AISight免费吗？"
faq_a5: "AISight在默认服务器上每天提供10次免费搜索。AISight Pro（¥35，一次性购买）移除此限制并解锁深度搜索。或连接您自己的SearXNG服务器——所有功能免费解锁，无需购买。"
faq_q6: "什么是深度搜索？"
faq_a6: "深度搜索是一种高级模式，使用多次AI研究来为复杂问题找到更好的答案。它重新组织您的查询，从不同角度运行并行搜索，并将结果综合成一个全面的答案。"
faq_q7: "服务器在哪里？"
faq_a7: "我们的SearXNG搜索服务器运行在芬兰赫尔辛基的Hetzner上。欧盟管辖权，符合GDPR的托管。服务器启用了零日志——无请求日志、无IP日志、无任何形式的分析。"
faq_q8: "AI质量够好吗？"
faq_a8: "Apple Intelligence是一个优化了设备端使用的~3B参数模型。它能很好地处理日常问题、研究和事实核查。对于复杂推理或创意任务，像GPT-4这样的云端模型可能更强——但您的查询保持私密，我们认为这是一个值得的取舍。"
faq_q9: "AISight在Android上可用吗？"
faq_a9: "AISight目前仅适用于Apple设备（iPhone、iPad、Mac），因为它依赖Apple Intelligence进行设备端AI处理。目前Android上没有等效的技术。"
