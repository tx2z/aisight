tradeoffs_title: "Un compromiso honesto"
tradeoffs_desc: "AISight usa Apple Intelligence, un modelo de ~3B parámetros que funciona completamente en tu dispositivo. No igualará a GPT-4 en razonamiento complejo o escritura creativa — pero para preguntas cotidianas, investigación y verificación de hechos, ofrece respuestas rápidas y con fuentes sin que nadie te observe. Creemos que ese compromiso vale la pena."
