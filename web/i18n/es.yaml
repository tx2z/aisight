faq_title: "Preguntas frecuentes"
faq_q1: "¿AISight es realmente privado?"
faq_a1: "Sí. Todo el procesamiento de IA ocurre en tu dispositivo usando Apple Intelligence (framework FoundationModels). Tus consultas, resultados de búsqueda y respuestas generadas nunca salen de tu dispositivo. No hay analíticas, ni rastreo, ni cuentas de usuario, ni servicios de IA en la nube involucrados."
faq_q2: "¿En qué se diferencia AISight de Perplexity?"
faq_a2: "A diferencia de Perplexity, AISight procesa todo en el dispositivo. Tus consultas nunca llegan a un servicio de IA en la nube. Las búsquedas pasan por SearXNG (un metabuscador de código abierto que respeta la privacidad) en lugar de APIs de búsqueda propietarias. Toda la app es código abierto bajo licencia MIT, y toda la infraestructura está en la UE."
faq_q3: "¿Qué dispositivos soporta AISight?"
faq_a3: "AISight requiere iPhone 15 Pro o posterior, iPad con chip M1 o posterior, o cualquier Mac con Apple Silicon. Necesitas iOS 26 / macOS 26 o posterior con Apple Intelligence activado."
faq_q4: "¿Qué es SearXNG?"
faq_a4: "SearXNG es un metabuscador gratuito y de código abierto que agrega resultados de múltiples motores de búsqueda (Google, Bing, Brave, Wikipedia y más) sin rastrear a los usuarios. AISight incluye un servidor SearXNG predeterminado alojado en Helsinki, Finlandia (jurisdicción de la UE)."
faq_q5: "¿AISight es gratis?"
faq_a5: "AISight ofrece 20 búsquedas gratuitas por día. AISight Pro ($4.99, pago único) elimina este límite y permite configurar un servidor SearXNG personalizado."
faq_q6: "¿Qué es la Búsqueda Profunda?"
faq_a6: "La Búsqueda Profunda es un modo avanzado que usa múltiples pases de investigación con IA para encontrar mejores respuestas a preguntas complejas. Reformula tu consulta, ejecuta búsquedas paralelas desde diferentes ángulos y sintetiza los resultados en una respuesta completa."
faq_q7: "¿Dónde está ubicado el servidor?"
faq_a7: "Nuestro servidor de búsqueda SearXNG funciona en Hetzner en Helsinki, Finlandia. Jurisdicción de la UE, hosting conforme al RGPD. El servidor tiene cero registros habilitados — sin logs de peticiones, sin logs de IP, sin analíticas de ningún tipo."
faq_q8: "¿Es suficientemente buena la calidad de la IA?"
faq_a8: "Apple Intelligence es un modelo capaz de ~3B parámetros optimizado para uso en el dispositivo. Maneja bien las preguntas cotidianas, la investigación y la verificación de hechos. Para razonamiento complejo o tareas creativas, los modelos en la nube como GPT-4 pueden ser más potentes — pero tus consultas permanecen privadas, lo que creemos que es un compromiso que vale la pena."
faq_q9: "¿AISight está disponible en Android?"
faq_a9: "AISight actualmente solo está disponible para dispositivos Apple (iPhone, iPad, Mac) ya que depende de Apple Intelligence para el procesamiento de IA en el dispositivo. No existe una tecnología equivalente en Android en este momento."
