features_title: "¿Por qué AISight?"
features_subtitle: "Una alternativa a Perplexity que realmente respeta tu privacidad."
feat_privacy_title: "Privacidad real"
feat_privacy_desc: "Sin analíticas, sin rastreo, sin cuentas, sin anuncios. Tus búsquedas se quedan en tu dispositivo."
feat_ai_title: "IA en el dispositivo"
feat_ai_desc: "Las respuestas se generan localmente con Apple Intelligence. Tus consultas nunca tocan un servicio de IA en la nube."
feat_search_title: "Búsqueda privada"
feat_search_desc: "Las búsquedas van a través de SearXNG, un metabuscador de código abierto que no te rastrea."
feat_citations_title: "Fuentes citadas"
feat_citations_desc: "Cada respuesta incluye citas numeradas con enlaces a las fuentes originales para que puedas verificar."
feat_universal_title: "iPhone, iPad y Mac"
feat_universal_desc: "App nativa con SwiftUI. Funciona en iPhone 15 Pro y posterior, iPad con M1+ y cualquier Mac con Apple Silicon."
feat_fast_title: "Respuestas instantáneas"
feat_fast_desc: "Los resultados se transmiten en tiempo real mientras el modelo en el dispositivo los genera."
how_title: "Cómo funciona"
how_subtitle: "De pregunta a respuesta en segundos — todo en tu dispositivo."
how_step1_title: "Haces una pregunta"
how_step1_desc: "Escribe cualquier pregunta. AISight la envía a un servidor de búsqueda SearXNG que respeta tu privacidad."
how_step2_title: "Llegan los resultados"
how_step2_desc: "SearXNG consulta Google, Bing y Brave simultáneamente. Los resultados se clasifican con Reciprocal Rank Fusion."
how_step3_title: "La IA lee y responde"
how_step3_desc: "Apple Intelligence en tu dispositivo lee las mejores fuentes y genera una respuesta con citas."
server_title: "Nuestra infraestructura"
server_subtitle: "Todo está diseñado para la privacidad y la transparencia."
server_searxng_title: "SearXNG autoalojado"
server_searxng_desc: "Nuestro servidor de búsqueda funciona en Hetzner en Helsinki, Finlandia. Jurisdicción UE, hosting conforme al RGPD."
server_security_title: "Seguridad reforzada"
server_security_desc: "Acceso solo por clave SSH, fail2ban, firewall UFW, actualizaciones automáticas. Certificados TLS auto-provistos por Caddy."
server_privacy_title: "Sin registros"
server_privacy_desc: "Los contenedores Docker funcionan sin registro de logs. Las consultas DNS van por Quad9. Sin logs de peticiones ni de IP."
server_cost_title: "Transparente y ligero"
server_cost_desc: "Toda la infraestructura cuesta menos de 5€/mes. Sin capital riesgo, sin métricas de crecimiento."
server_open_title: "Código abierto"
server_open_desc: "AISight es totalmente de código abierto bajo licencia MIT. Inspecciona cada línea de código."
server_eu_title: "Basado en la UE"
server_eu_desc: "Servidor en Finlandia, desarrollador en España. Todo el procesamiento bajo jurisdicción de la UE y protección del RGPD."
deep_title: "Búsqueda profunda"
deep_desc: "Para preguntas complejas, la búsqueda profunda usa múltiples pases de investigación con IA para encontrar mejores respuestas."
cta_title: "¿Listo para respuestas privadas?"
cta_desc: "Descarga AISight y toma el control de tu búsqueda."
