features_title: "Porquê AISight?"
features_subtitle: "Uma alternativa ao Perplexity que realmente respeita a sua privacidade."
feat_privacy_title: "Privacidade real"
feat_privacy_desc: "Sem analíticas, sem rastreamento, sem contas, sem anúncios. As suas pesquisas ficam no seu dispositivo."
feat_ai_title: "IA no dispositivo"
feat_ai_desc: "As respostas são geradas localmente com Apple Intelligence. As suas consultas nunca tocam um serviço de IA na nuvem."
feat_search_title: "Pesquisa privada"
feat_search_desc: "As pesquisas passam pelo SearXNG — um meta-motor open source que não o rastreia."
feat_citations_title: "Fontes citadas"
feat_citations_desc: "Cada resposta inclui citações numeradas com links para as fontes originais para verificação."
feat_universal_title: "iPhone, iPad e Mac"
feat_universal_desc: "App nativa em SwiftUI. Funciona no iPhone 15 Pro+, iPad M1+ e qualquer Mac Apple Silicon."
feat_fast_title: "Respostas instantâneas"
feat_fast_desc: "Os resultados são transmitidos em tempo real enquanto o modelo local os gera."
how_title: "Como funciona"
how_subtitle: "Da pergunta à resposta em segundos — tudo no seu dispositivo."
how_step1_title: "Faz uma pergunta"
how_step1_desc: "Escreva qualquer pergunta. AISight envia-a para um servidor SearXNG que respeita a privacidade."
how_step2_title: "Chegam os resultados"
how_step2_desc: "SearXNG consulta Google, Bing e Brave simultaneamente. Os resultados são classificados com Reciprocal Rank Fusion."
how_step3_title: "A IA lê e responde"
how_step3_desc: "Apple Intelligence no seu dispositivo lê as melhores fontes e gera uma resposta com citações."
server_title: "A nossa infraestrutura"
server_subtitle: "Tudo é desenhado para privacidade e transparência."
server_searxng_title: "SearXNG auto-hospedado"
server_searxng_desc: "O nosso servidor de pesquisa funciona na Hetzner em Helsínquia, Finlândia. Jurisdição da UE, hosting conforme o RGPD."
server_security_title: "Segurança reforçada"
server_security_desc: "Acesso apenas por chave SSH, fail2ban, firewall UFW, atualizações automáticas. Certificados TLS pelo Caddy."
server_privacy_title: "Zero registos"
server_privacy_desc: "Os contentores Docker funcionam sem logging. As consultas DNS vão pelo Quad9. Sem logs de pedidos ou IP."
server_cost_title: "Transparente e leve"
server_cost_desc: "Toda a infraestrutura custa menos de 5€/mês. Sem capital de risco, sem métricas de crescimento."
server_open_title: "Código aberto"
server_open_desc: "AISight é totalmente open source sob licença MIT. Inspecione cada linha de código."
server_eu_title: "Baseado na UE"
server_eu_desc: "Servidor na Finlândia, programador em Espanha. Todo o processamento sob jurisdição da UE e proteção do RGPD."
deep_title: "Pesquisa profunda"
deep_desc: "Para perguntas complexas, a pesquisa profunda usa múltiplos passes de investigação IA para melhores respostas."
cta_title: "Pronto para respostas privadas?"
cta_desc: "Baixe AISight e assuma o controlo da sua pesquisa."
