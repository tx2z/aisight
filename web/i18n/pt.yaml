tradeoffs_title: "Um compromisso honesto"
tradeoffs_desc: "AISight usa Apple Intelligence, um modelo de ~3B parâmetros que funciona inteiramente no seu dispositivo. Não igualará o GPT-4 em raciocínio complexo ou escrita criativa — mas para perguntas do dia a dia, pesquisa e verificação de factos, oferece respostas rápidas e com fontes sem ninguém a observar. Acreditamos que esse compromisso vale a pena."
