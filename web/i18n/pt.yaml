faq_title: "Perguntas frequentes"
faq_q1: "O AISight é realmente privado?"
faq_a1: "Sim. Todo o processamento de IA acontece no seu dispositivo usando Apple Intelligence (framework FoundationModels). As suas consultas, resultados de pesquisa e respostas geradas nunca saem do seu dispositivo. Não há analíticas, rastreamento, contas de utilizador ou serviços de IA na nuvem envolvidos."
faq_q2: "Como é que o AISight é diferente do Perplexity?"
faq_a2: "Ao contrário do Perplexity, o AISight processa tudo no dispositivo. As suas consultas nunca chegam a um serviço de IA na nuvem. A pesquisa passa pelo SearXNG (um meta-motor open source que respeita a privacidade) em vez de APIs de pesquisa proprietárias. Toda a app é código aberto sob licença MIT, e toda a infraestrutura está na UE."
faq_q3: "Que dispositivos o AISight suporta?"
faq_a3: "O AISight requer iPhone 15 Pro ou posterior, iPad com chip M1 ou posterior, ou qualquer Mac com Apple Silicon. Precisa de iOS 26 / macOS 26 ou posterior com Apple Intelligence ativado."
faq_q4: "O que é o SearXNG?"
faq_a4: "SearXNG é um meta-motor de busca gratuito e open source que agrega resultados de múltiplos motores de busca (Google, Bing, Brave, Wikipedia e mais) sem rastrear os utilizadores. O AISight inclui um servidor SearXNG predefinido alojado em Helsínquia, Finlândia (jurisdição da UE)."
faq_q5: "O AISight é grátis?"
faq_a5: "O AISight oferece 10 pesquisas gratuitas por dia. O AISight Pro ($4.99, compra única) remove este limite, desbloqueia a Pesquisa Profunda e permite configurar um servidor SearXNG personalizado."
faq_q6: "O que é a Pesquisa Profunda?"
faq_a6: "A Pesquisa Profunda é um modo avançado que usa múltiplos passes de investigação IA para encontrar melhores respostas a perguntas complexas. Reformula a sua consulta, executa pesquisas paralelas de diferentes ângulos e sintetiza os resultados numa resposta abrangente."
faq_q7: "Onde está localizado o servidor?"
faq_a7: "O nosso servidor de pesquisa SearXNG funciona na Hetzner em Helsínquia, Finlândia. Jurisdição da UE, hosting conforme o RGPD. O servidor tem zero logging ativado — sem logs de pedidos, sem logs de IP, sem analíticas de qualquer tipo."
faq_q8: "A qualidade da IA é suficiente?"
faq_a8: "Apple Intelligence é um modelo capaz de ~3B parâmetros otimizado para uso no dispositivo. Lida bem com perguntas do dia a dia, pesquisa e verificação de factos. Para raciocínio complexo ou tarefas criativas, modelos na nuvem como GPT-4 podem ser mais fortes — mas as suas consultas permanecem privadas, o que acreditamos ser um compromisso que vale a pena."
faq_q9: "O AISight está disponível para Android?"
faq_a9: "O AISight está atualmente disponível apenas para dispositivos Apple (iPhone, iPad, Mac) pois depende do Apple Intelligence para o processamento de IA no dispositivo. Não existe uma tecnologia equivalente no Android neste momento."
