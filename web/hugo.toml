baseURL = "https://private-search-intelligence.app"
title = "AISight"
copyright = "© 2026 Jesus Perez Paz"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
disableKinds = ["taxonomy", "term"]

[params]
  author = "Jesus Perez Paz"
  email = "jesus@perezpaz.es"
  ogImage = "/images/og-image.png"
  tagline = "Private answers, powered by Apple Intelligence"

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# --- Languages ---

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    weight = 1
    title = "AISight — Private AI Answer Engine | Perplexity Alternative"
    [languages.en.params]
      description = "AISight is a private AI answer engine for iPhone, iPad, and Mac. Search the web and get answers on-device with Apple Intelligence. No tracking, no cloud AI. Made in EU."

  [languages.es]
    languageCode = "es"
    languageName = "Español"
    weight = 2
    title = "AISight — Motor de respuestas con IA privada | Alternativa a Perplexity"
    [languages.es.params]
      description = "AISight es un motor de respuestas con IA privada para iPhone, iPad y Mac. Busca en la web y obtén respuestas en el dispositivo con Apple Intelligence. Sin rastreo, sin IA en la nube. Hecho en la UE."

  [languages.fr]
    languageCode = "fr"
    languageName = "Français"
    weight = 3
    title = "AISight — Moteur de réponses IA privé | Alternative à Perplexity"
